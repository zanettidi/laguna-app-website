<svg width="240" height="56" viewBox="0 0 240 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Laguna Systems">
  <defs>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003F69"/>
      <stop offset="1" stop-color="#260D33"/>
    </linearGradient>
  </defs>
  <!-- Marca: lagoa aérea (anéis concêntricos abertos) -->
  <rect x="2" y="2" width="52" height="52" rx="13" fill="url(#logo-bg)"/>
  <g transform="rotate(-45 28 28)" fill="none" stroke-linecap="round">
    <circle cx="28" cy="28" r="17" stroke="#106B87" stroke-width="3.6" stroke-dasharray="80 27"/>
    <circle cx="28" cy="28" r="10" stroke="#157A8C" stroke-width="3.6" stroke-dasharray="47 16"/>
  </g>
  <circle cx="28" cy="28" r="5" fill="#B3ACA4"/>
  <!-- Wordmark -->
  <text x="64" y="27" font-family="'Poppins','Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#260D33">Laguna</text>
  <text x="65" y="45" font-family="'Poppins','Segoe UI',sans-serif" font-size="13" font-weight="500" letter-spacing="4" fill="#106B87">SYSTEMS</text>
</svg>
